<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 1780">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Noto Sans SC', 'PingFang SC', sans-serif; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="530" y="38" fill="white" font-size="18" font-weight="700" text-anchor="middle">后端研发流程</text>
  <text x="530" y="58" fill="#94a3b8" font-size="10" text-anchor="middle">Backend Development Process — 前端外协 / 后端主导模式</text>

  <!-- Start node -->
  <rect x="470" y="75" width="120" height="36" rx="18" fill="#0f172a"/>
  <rect x="470" y="75" width="120" height="36" rx="18" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="530" y="97" fill="white" font-size="11" font-weight="600" text-anchor="middle">开始</text>

  <line x1="530" y1="111" x2="530" y2="130" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- ==================== Phase 1: 需求分析 ==================== -->
  <rect x="40" y="120" width="130" height="290" rx="8" fill="rgba(8,51,68,0.2)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="105" y="145" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">01</text>
  <text x="105" y="160" fill="#22d3ee" font-size="10" font-weight="500" text-anchor="middle">需求分析</text>

  <!-- Step 1 -->
  <rect x="390" y="130" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="130" width="280" height="44" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="415" y="156" fill="white" font-size="11" font-weight="600">1. 需求交底</text>
  <text x="655" y="156" fill="#94a3b8" font-size="9" text-anchor="end">产品组发起</text>

  <line x1="530" y1="174" x2="530" y2="196" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="390" y="196" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="196" width="280" height="44" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="415" y="222" fill="white" font-size="11" font-weight="600">2. 后端功能分析</text>
  <text x="655" y="222" fill="#94a3b8" font-size="9" text-anchor="end">拆解功能点</text>

  <line x1="530" y1="240" x2="530" y2="262" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="390" y="262" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="262" width="280" height="44" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="415" y="288" fill="white" font-size="11" font-weight="600">3. 接口拆解</text>
  <text x="655" y="288" fill="#94a3b8" font-size="9" text-anchor="end">梳理接口清单</text>

  <line x1="530" y1="306" x2="530" y2="328" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="390" y="328" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="328" width="280" height="44" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="415" y="354" fill="white" font-size="11" font-weight="600">4. 工作量评估</text>
  <text x="655" y="354" fill="#94a3b8" font-size="9" text-anchor="end">量化开发工时</text>

  <line x1="530" y1="372" x2="530" y2="405" stroke="#fbbf24" marker-end="url(#arrow-amber)"/>

  <!-- Gate 1 -->
  <g transform="translate(530, 440)">
    <polygon points="0,-35 140,0 0,35 -140,0" fill="#0f172a"/>
    <polygon points="0,-35 140,0 0,35 -140,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text y="-6" fill="white" font-size="10" font-weight="600" text-anchor="middle">评审门禁 ①</text>
    <text y="10" fill="#fbbf24" font-size="9" text-anchor="middle">接口清单 + 工作量预估</text>
  </g>

  <line x1="670" y1="440" x2="730" y2="440" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="735" y="425" width="220" height="32" rx="4" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="745" y="440" fill="#fbbf24" font-size="8" font-weight="500">提交产品组/项目经理审批</text>
  <text x="745" y="452" fill="#94a3b8" font-size="8">未通过 → 返回步骤2</text>

  <path d="M 390,440 L 340,440 L 340,218 L 390,218" fill="none" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-rose)"/>
  <text x="328" y="340" fill="#fb7185" font-size="8" text-anchor="end" transform="rotate(-90, 328, 340)">未通过</text>

  <line x1="530" y1="475" x2="530" y2="510" stroke="#64748b" marker-end="url(#arrow)"/>
  <text x="545" y="498" fill="#34d399" font-size="8" font-weight="500">通过</text>

  <!-- ==================== Phase 2: 接口设计 ==================== -->
  <rect x="40" y="495" width="130" height="190" rx="8" fill="rgba(6,78,59,0.2)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="105" y="520" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">02</text>
  <text x="105" y="535" fill="#34d399" font-size="10" font-weight="500" text-anchor="middle">接口设计</text>

  <!-- Step 5 -->
  <rect x="390" y="510" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="510" width="280" height="44" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="415" y="536" fill="white" font-size="11" font-weight="600">5. 接口协议编写</text>
  <text x="655" y="536" fill="#94a3b8" font-size="9" text-anchor="end">请求/响应/错误码</text>

  <line x1="530" y1="554" x2="530" y2="576" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Step 6 -->
  <rect x="390" y="576" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="576" width="280" height="44" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="415" y="602" fill="white" font-size="11" font-weight="600">6. 接口协议评审</text>
  <text x="655" y="602" fill="#94a3b8" font-size="9" text-anchor="end">前后端联合评审</text>

  <line x1="530" y1="620" x2="530" y2="653" stroke="#fbbf24" marker-end="url(#arrow-amber)"/>

  <!-- Gate 2 -->
  <g transform="translate(530, 688)">
    <polygon points="0,-35 140,0 0,35 -140,0" fill="#0f172a"/>
    <polygon points="0,-35 140,0 0,35 -140,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text y="-6" fill="white" font-size="10" font-weight="600" text-anchor="middle">评审门禁 ②</text>
    <text y="10" fill="#fbbf24" font-size="9" text-anchor="middle">接口协议 + 前后端评审</text>
  </g>

  <line x1="670" y1="688" x2="730" y2="688" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="735" y="673" width="220" height="32" rx="4" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="745" y="688" fill="#fbbf24" font-size="8" font-weight="500">前后端双方签字确认</text>
  <text x="745" y="700" fill="#94a3b8" font-size="8">未通过 → 返回步骤5</text>

  <path d="M 390,688 L 340,688 L 340,532 L 390,532" fill="none" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-rose)"/>
  <text x="328" y="620" fill="#fb7185" font-size="8" text-anchor="end" transform="rotate(-90, 328, 620)">未通过</text>

  <line x1="530" y1="723" x2="530" y2="758" stroke="#64748b" marker-end="url(#arrow)"/>
  <text x="545" y="746" fill="#34d399" font-size="8" font-weight="500">通过</text>

  <!-- ==================== Phase 3: 开发联调 ==================== -->
  <rect x="40" y="743" width="130" height="330" rx="8" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="105" y="768" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle">03</text>
  <text x="105" y="783" fill="#a78bfa" font-size="10" font-weight="500" text-anchor="middle">开发联调</text>

  <!-- Step 7 -->
  <rect x="390" y="758" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="758" width="280" height="44" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="415" y="784" fill="white" font-size="11" font-weight="600">7. 开发</text>
  <text x="655" y="784" fill="#94a3b8" font-size="9" text-anchor="end">编码 + 单元测试</text>

  <line x1="530" y1="802" x2="530" y2="824" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Step 8a -->
  <rect x="390" y="824" width="280" height="50" rx="6" fill="#0f172a"/>
  <rect x="390" y="824" width="280" height="50" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="415" y="846" fill="white" font-size="11" font-weight="600">8a. 研发负责人接口测试</text>
  <text x="655" y="846" fill="#94a3b8" font-size="9" text-anchor="end">接口质量守门</text>
  <text x="415" y="864" fill="#c4b5fd" font-size="8">覆盖不同场景 · 字段完整性校验</text>

  <!-- Arrow 8a → 8b (incremental handoff) -->
  <line x1="530" y1="874" x2="530" y2="896" stroke="#a78bfa" marker-end="url(#arrow-violet)"/>
  <rect x="545" y="878" width="120" height="14" rx="7" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="605" y="888" fill="#c4b5fd" font-size="8" font-weight="500" text-anchor="middle">增量交付联调</text>

  <!-- Step 8b -->
  <rect x="390" y="900" width="280" height="50" rx="6" fill="#0f172a"/>
  <rect x="390" y="900" width="280" height="50" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="415" y="922" fill="white" font-size="11" font-weight="600">8b. 前后端联调</text>
  <text x="655" y="922" fill="#94a3b8" font-size="9" text-anchor="end">对接验证</text>
  <text x="415" y="940" fill="#c4b5fd" font-size="8">缺陷修复 · 联调通过确认</text>

  <!-- Feedback loop: 8b → 7 (blocking issues) -->
  <path d="M 670,925 L 730,925 L 730,780 L 670,780" fill="none" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>
  <rect x="735" y="838" width="130" height="30" rx="4" fill="rgba(120,53,15,0.15)" stroke="#fb923c" stroke-width="0.5"/>
  <text x="745" y="850" fill="#fb923c" font-size="8" font-weight="500">联调阻断问题</text>
  <text x="745" y="862" fill="#94a3b8" font-size="8">后端持续开发支持</text>

  <!-- Arrow to Gate 3 -->
  <line x1="530" y1="950" x2="530" y2="977" stroke="#fbbf24" marker-end="url(#arrow-amber)"/>

  <!-- Gate 3 (moved here, after step 8) -->
  <g transform="translate(530, 1012)">
    <polygon points="0,-35 140,0 0,35 -140,0" fill="#0f172a"/>
    <polygon points="0,-35 140,0 0,35 -140,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text y="-6" fill="white" font-size="10" font-weight="600" text-anchor="middle">评审门禁 ③</text>
    <text y="10" fill="#fbbf24" font-size="9" text-anchor="middle">后端测试报告</text>
  </g>

  <!-- Gate 3 annotation -->
  <line x1="670" y1="1012" x2="730" y2="1012" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="735" y="997" width="220" height="32" rx="4" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="745" y="1012" fill="#fbbf24" font-size="8" font-weight="500">研发负责人提交 · 项目经理审批</text>
  <text x="745" y="1024" fill="#94a3b8" font-size="8">未通过 → 返回步骤7</text>

  <!-- Gate 3 return arrow -->
  <path d="M 390,1012 L 310,1012 L 310,780 L 390,780" fill="none" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-rose)"/>
  <text x="298" y="910" fill="#fb7185" font-size="8" text-anchor="end" transform="rotate(-90, 298, 910)">未通过</text>

  <!-- Arrow Gate3→Phase4 -->
  <line x1="530" y1="1047" x2="530" y2="1082" stroke="#64748b" marker-end="url(#arrow)"/>
  <text x="545" y="1070" fill="#34d399" font-size="8" font-weight="500">通过</text>

  <!-- ==================== Phase 4: 测试 ==================== -->
  <rect x="40" y="1067" width="130" height="190" rx="8" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="105" y="1092" fill="#fb7185" font-size="11" font-weight="700" text-anchor="middle">04</text>
  <text x="105" y="1107" fill="#fb7185" font-size="10" font-weight="500" text-anchor="middle">测试</text>

  <!-- Step 9 -->
  <rect x="390" y="1082" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="1082" width="280" height="44" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="415" y="1108" fill="white" font-size="11" font-weight="600">9. 测试组测试</text>
  <text x="655" y="1108" fill="#94a3b8" font-size="9" text-anchor="end">功能 + 集成测试</text>

  <line x1="530" y1="1126" x2="530" y2="1148" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Step 10 -->
  <rect x="390" y="1148" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="1148" width="280" height="44" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="415" y="1174" fill="white" font-size="11" font-weight="600">10. 验收测试</text>
  <text x="655" y="1174" fill="#94a3b8" font-size="9" text-anchor="end">业务验收确认</text>

  <!-- Arrow Step10→Phase5 -->
  <line x1="530" y1="1192" x2="530" y2="1228" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- ==================== Phase 5: 上线发布 ==================== -->
  <rect x="40" y="1213" width="130" height="400" rx="8" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="105" y="1238" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">05</text>
  <text x="105" y="1253" fill="#fbbf24" font-size="10" font-weight="500" text-anchor="middle">上线发布</text>

  <!-- Step 11 -->
  <rect x="390" y="1228" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="1228" width="280" height="44" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="415" y="1254" fill="white" font-size="11" font-weight="600">11. 上线Checklist提交</text>
  <text x="655" y="1254" fill="#94a3b8" font-size="9" text-anchor="end">配置/脚本/环境变量</text>

  <line x1="530" y1="1272" x2="530" y2="1294" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Step 12 -->
  <rect x="390" y="1294" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="1294" width="280" height="44" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="415" y="1320" fill="white" font-size="11" font-weight="600">12. 流水线发布Demo环境</text>
  <text x="655" y="1320" fill="#94a3b8" font-size="9" text-anchor="end">自动化部署</text>

  <line x1="530" y1="1338" x2="530" y2="1360" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Step 13 -->
  <rect x="390" y="1360" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="1360" width="280" height="44" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="415" y="1386" fill="white" font-size="11" font-weight="600">13. Demo环境验证</text>
  <text x="655" y="1386" fill="#94a3b8" font-size="9" text-anchor="end">核心流程冒烟</text>

  <line x1="530" y1="1404" x2="530" y2="1426" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Step 14 -->
  <rect x="390" y="1426" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="1426" width="280" height="44" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="415" y="1452" fill="white" font-size="11" font-weight="600">14. 流水线发布生产环境</text>
  <text x="655" y="1452" fill="#94a3b8" font-size="9" text-anchor="end">正式部署</text>

  <line x1="530" y1="1470" x2="530" y2="1492" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Step 15 -->
  <rect x="390" y="1492" width="280" height="44" rx="6" fill="#0f172a"/>
  <rect x="390" y="1492" width="280" height="44" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="415" y="1518" fill="white" font-size="11" font-weight="600">15. 生产环境验证</text>
  <text x="655" y="1518" fill="#94a3b8" font-size="9" text-anchor="end">上线后核心验证</text>

  <line x1="530" y1="1536" x2="530" y2="1565" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- End node -->
  <rect x="470" y="1565" width="120" height="36" rx="18" fill="#0f172a"/>
  <rect x="470" y="1565" width="120" height="36" rx="18" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="530" y="1587" fill="white" font-size="11" font-weight="600" text-anchor="middle">完成</text>

  <!-- ==================== Legend ==================== -->
  <rect x="40" y="1635" width="980" height="110" rx="8" fill="rgba(30,41,59,0.5)" stroke="#334155" stroke-width="1"/>
  <text x="60" y="1655" fill="#94a3b8" font-size="10" font-weight="600">图例</text>

  <rect x="60" y="1668" width="30" height="14" rx="3" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="98" y="1679" fill="#94a3b8" font-size="9">流程步骤</text>

  <g transform="translate(200, 1675)">
    <polygon points="0,-8 20,0 0,8 -20,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  </g>
  <text x="228" y="1679" fill="#94a3b8" font-size="9">评审门禁</text>

  <rect x="320" y="1668" width="30" height="14" rx="7" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
  <text x="358" y="1679" fill="#94a3b8" font-size="9">开始/结束</text>

  <line x1="440" y1="1675" x2="475" y2="1675" stroke="#64748b" marker-end="url(#arrow)"/>
